name: News Summary

on:
  schedule:
    - cron: '0 12 * * *' # UTC 12:00 = JST 21:00
  workflow_dispatch:

env:
  TZ: Asia/Tokyo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  news_summary:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Create Google service account key
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import re
          from pathlib import Path

          secret = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON")
          if not secret:
              raise SystemExit("GOOGLE_SERVICE_ACCOUNT_JSON secret is not set")

          raw_secret = secret.strip()
          if raw_secret.startswith("export "):
              raw_secret = raw_secret.removeprefix("export ").strip()
          if "=" in raw_secret and not raw_secret.lstrip().startswith("{"):
              key, value = raw_secret.split("=", 1)
              if key.strip() in {"GOOGLE_SERVICE_ACCOUNT_JSON", "GOOGLE_CREDENTIALS_JSON"}:
                  raw_secret = value.strip()
          if len(raw_secret) >= 2 and raw_secret[0] == raw_secret[-1] and raw_secret[0] in {"'", '"'}:
              raw_secret = raw_secret[1:-1].strip()

          def parse_json(value):
              parsed = json.loads(value)
              if isinstance(parsed, str):
                  parsed = json.loads(parsed)
              if not isinstance(parsed, dict):
                  raise ValueError("service account value is not a JSON object")
              return normalize_private_key(parsed)

          def normalize_private_key(credentials):
              private_key = str(credentials.get("private_key", "")).strip()
              if not private_key:
                  raise ValueError("service account private_key is empty")

              private_key = private_key.replace("\\n", "\n")
              private_key = private_key.replace("\r\n", "\n").replace("\r", "\n")
              private_key = re.sub(r"-----BEGIN PRIVATE KEY-----\s*", "-----BEGIN PRIVATE KEY-----\n", private_key)
              private_key = re.sub(r"\s*-----END PRIVATE KEY-----", "\n-----END PRIVATE KEY-----\n", private_key)

              begin = "-----BEGIN PRIVATE KEY-----"
              end = "-----END PRIVATE KEY-----"
              if begin in private_key and end in private_key:
                  body = private_key.split(begin, 1)[1].split(end, 1)[0]
                  body = "".join(body.split())
                  if body:
                      wrapped_body = "\n".join(body[i : i + 64] for i in range(0, len(body), 64))
                      private_key = f"{begin}\n{wrapped_body}\n{end}\n"

              credentials["private_key"] = private_key
              return credentials

          def repair_private_key_newlines(value):
              match = re.search(r'("private_key"\s*:\s*")(.*?)("\s*,\s*"client_email")', value, re.S)
              if not match:
                  return value
              private_key = match.group(2).replace("\\n", "\n")
              private_key = private_key.replace("\r\n", "\n").replace("\r", "\n")
              private_key = private_key.strip("\n").replace("\n", "\\n")
              return value[: match.start(2)] + private_key + value[match.end(2) :]

          try:
              credentials = parse_json(raw_secret)
          except (json.JSONDecodeError, ValueError):
              repaired_secret = repair_private_key_newlines(raw_secret)
              try:
                  credentials = parse_json(repaired_secret)
              except Exception:
                  try:
                      decoded = base64.b64decode("".join(raw_secret.split()), validate=True).decode("utf-8")
                      credentials = parse_json(decoded)
                  except Exception as error:
                      raise SystemExit(
                          "GOOGLE_SERVICE_ACCOUNT_JSON must be service account JSON, "
                          "GOOGLE_SERVICE_ACCOUNT_JSON=service-account-json, "
                          "base64-encoded service account JSON, or JSON with private_key newlines"
                      ) from error

          normalized_secret = json.dumps(credentials)
          credential_files = {
              os.environ.get("GOOGLE_CREDENTIALS_FILE", "abiding-ascent-476815-q6-56a05b29f113.json"),
              "abiding-ascent-476815-q6-56a05b29f113.json",
              "abiding-ascent-476815-q6-99d884d020ae.json",
          }
          for credential_file in credential_files:
              Path(credential_file).write_text(normalized_secret, encoding="utf-8")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: |
          python tdnet.py
          python news.py
          python edinet.py
          python fp_sp.py
