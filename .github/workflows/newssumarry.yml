name: News Summary

on:
  schedule:
    - cron: '0 12 * * *' # UTC 12:00 = JST 21:00
  workflow_dispatch:

env:
  TZ: Asia/Tokyo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  news_summary:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Create Google service account key
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          secret = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON")
          if not secret:
              raise SystemExit("GOOGLE_SERVICE_ACCOUNT_JSON secret is not set")

          raw_secret = secret.strip()
          if raw_secret.startswith("export "):
              raw_secret = raw_secret.removeprefix("export ").strip()
          if "=" in raw_secret and not raw_secret.lstrip().startswith("{"):
              key, value = raw_secret.split("=", 1)
              if key.strip() in {"GOOGLE_SERVICE_ACCOUNT_JSON", "GOOGLE_CREDENTIALS_JSON"}:
                  raw_secret = value.strip()
          if len(raw_secret) >= 2 and raw_secret[0] == raw_secret[-1] and raw_secret[0] in {"'", '"'}:
              raw_secret = raw_secret[1:-1].strip()

          try:
              credentials = json.loads(raw_secret)
              if isinstance(credentials, str):
                  credentials = json.loads(credentials)
          except json.JSONDecodeError:
              try:
                  decoded = base64.b64decode("".join(raw_secret.split()), validate=True).decode("utf-8")
                  credentials = json.loads(decoded)
              except Exception as error:
                  raise SystemExit(
                      "GOOGLE_SERVICE_ACCOUNT_JSON must be service account JSON, "
                      "GOOGLE_SERVICE_ACCOUNT_JSON=service-account-json, "
                      "or base64-encoded service account JSON"
                  ) from error
          if not isinstance(credentials, dict):
              raise SystemExit("GOOGLE_SERVICE_ACCOUNT_JSON did not decode to a JSON object")

          normalized_secret = json.dumps(credentials)
          credential_files = {
              os.environ.get("GOOGLE_CREDENTIALS_FILE", "abiding-ascent-476815-q6-56a05b29f113.json"),
              "abiding-ascent-476815-q6-56a05b29f113.json",
              "abiding-ascent-476815-q6-99d884d020ae.json",
          }
          for credential_file in credential_files:
              Path(credential_file).write_text(normalized_secret, encoding="utf-8")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: |
          python tdnet.py
          python news.py
          python edinet.py
          python fp_sp.py
